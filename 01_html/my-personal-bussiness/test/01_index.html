<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hamster Shop Layout</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <img src="/01_html/my-personal-bussiness/picture/ดาวน์โหลด (1).jpg" class="hamster-side left" alt="Hamster Left">
    <img src="/01_html/my-personal-bussiness/picture/ดาวน์โหลด (1).jpg" class="hamster-side right" alt="Hamster Right">

    <div class="main-container">
        
        <nav class="red-box nav-bar">
            <div class="nav-item green"></div>
            <div class="nav-item purple"></div>
            <div class="nav-item green"></div>
            <div class="nav-item purple"></div>
        </nav>

        <div class="header-section">
            <div class="red-box">ชื่อร้าน</div>
            <div class="red-box text-center">อนิเมชั่นแฮมสเตอร์วิ่งเล่น</div>
        </div>

        <div class="red-box large-banner">
            รูปแฮมสเตอร์เท่ๆ 2-3 รูป หรือเพิ่มวิดีโอด้วย
        </div>

        <div class="content-section">
            <div class="red-box">เมนู</div>
            <div class="red-box">คลิกเมนูแล้วเปลี่ยนรูป</div>
        </div>

        <div class="red-box">ข้อความเพิ่มเติม</div>
        <div class="red-box">Footer</div>

    </div>

</body>
</html>
