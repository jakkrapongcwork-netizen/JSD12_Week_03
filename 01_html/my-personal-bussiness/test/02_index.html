<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hamster Food Shop Layout</title>
    <link rel="stylesheet" href="02_style.css">
</head>
<body>

    <div class="container">
        
            <img src="/01_html/my-personal-bussiness/picture/ดาวน์โหลด (1).jpg" alt="Hamster Left" class="sidebar-left sidebar-right">
            <img src="/01_html/my-personal-bussiness/picture/ดาวน์โหลด (1).jpg" alt="Hamster Left" class="sidebar-left sidebar-right">
        

        <main class="main-content">
            <header>
                <nav class="nav-bar">
                    <div class="status-dots">
                        <span class="dot green"></span>
                        <span class="dot purple"></span>
                        <span class="dot green"></span>
                        <span class="dot purple"></span>
                    </div>
                </nav>
                <div class="header-top">
                    <div class="box shop-name">ชื่อร้าน</div>
                    <div class="box animation-area">อนิเมชั่นแฮมสเตอร์วิ่งเล่น</div>
                </div>
            </header>

            <section class="hero-section box">
                รูปแฮมสเตอร์เท่ๆ 2-3 รูป หรือเพิ่มวิดีโอด้วย
            </section>

            <section class="content-grid">
                <div class="box menu-list">เมนู</div>
                <div class="box display-area">คลิกเมนูแล้วเปลี่ยนรูป</div>
            </section>

            <section class="box info-text">
                ข้อความเพิ่มเติม
            </section>

            <footer class="box footer">
                Footer
            </footer>
        </main>

        <aside class="sidebar-right">
            <img src="https://via.placeholder.com/150x800" alt="Hamster Right">
        </aside>
    </div>

</body>
</html>
